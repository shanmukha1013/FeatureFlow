version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://user:pass@postgres:5432/featureflow
      - POSTGRES_URL=postgresql://user:pass@postgres:5432/featureflow
      - JWT_SECRET=${JWT_SECRET:-enterprise-secret}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - featureflow_models:/app/models
      - featureflow_datasets:/app/datasets

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=featureflow
      - POSTGRES_PASSWORD=featureflow_password
      - POSTGRES_DB=featureflow_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U featureflow -d featureflow_test"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  featureflow_models:
  featureflow_datasets:
  redis_data:
  postgres_data:
