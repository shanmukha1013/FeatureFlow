version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql://user:pass@postgres:5432/featureflow
      - JWT_SECRET=${JWT_SECRET:-enterprise-secret}
    depends_on:
      - redis
      - postgres
    volumes:
      - featureflow_models:/app/models
      - featureflow_datasets:/app/datasets

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=featureflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  featureflow_models:
  featureflow_datasets:
  redis_data:
  postgres_data:
