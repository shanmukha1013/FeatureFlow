[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    unit: Tests that do not require a database.
    integration: Tests that require PostgreSQL.
    performance: Tests that require PostgreSQL and Redis concurrently.

# ---------------------------------------------------------------------------
# Warning filters — NARROW suppression only for verified third-party libraries
# No FeatureFlow application warnings are suppressed here.
# ---------------------------------------------------------------------------
filterwarnings =
    # SHAP v0.46 — PendingDeprecationWarning in colormap setup.
    # Source: shap/plots/colors/_colors.py — third-party, current version,
    # no supported migration available yet (cmap.with_extremes not yet adopted).
    ignore::PendingDeprecationWarning:shap.*

    # Great Expectations v0.18 — uses pyparsing setResultsName (deprecated API).
    # Source: great_expectations/core/urn.py — third-party, current compat version,
    # upstream issue tracked; no API migration available in this GX version.
    ignore:.*setResultsName.*:DeprecationWarning:pyparsing.*
    ignore:.*setResultsName.*:UserWarning:great_expectations.*

    # Great Expectations v0.18 — uses marshmallow Number field (deprecated in marshmallow 4).
    # Source: great_expectations/data_context/types/base.py — third-party dependency conflict.
    ignore::marshmallow.warnings.ChangedInMarshmallow4Warning:great_expectations.*
