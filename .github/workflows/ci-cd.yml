name: FeatureFlow Enterprise CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: featureflow
          POSTGRES_PASSWORD: featureflow_password
          POSTGRES_DB: featureflow_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest pytest-asyncio flake8 httpx
        
    - name: Lint with flake8
      run: |
        flake8 app tests --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Tests
      env:
        DATABASE_URL: postgresql://featureflow:featureflow_password@localhost:5432/featureflow_db
        PYTHONPATH: .
      run: |
        pytest tests/ -v

  build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build Backend Image
      run: docker build -t myorg/featureflow-api:latest .
      
    - name: Push Backend Image
      run: docker push myorg/featureflow-api:latest
      
    - name: Build Frontend Image
      run: docker build -t myorg/featureflow-ui:latest ./app/frontend
      
    - name: Push Frontend Image
      run: docker push myorg/featureflow-ui:latest
