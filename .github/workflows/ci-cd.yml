name: FeatureFlow Enterprise CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest flake8
        
    - name: Lint with flake8
      run: |
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Tests
      run: |
        pytest tests/

  build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build Backend Image
      run: docker build -t myorg/featureflow-api:latest .
      
    - name: Push Backend Image
      run: docker push myorg/featureflow-api:latest
      
    - name: Build Frontend Image
      run: docker build -t myorg/featureflow-ui:latest ./app/frontend
      
    - name: Push Frontend Image
      run: docker push myorg/featureflow-ui:latest
