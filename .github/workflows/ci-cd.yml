name: FeatureFlow Enterprise CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: featureflow
          POSTGRES_PASSWORD: featureflow_password
          POSTGRES_DB: featureflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U featureflow -d featureflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest pytest-asyncio pytest-timeout flake8 httpx

    - name: Verify Python compilation
      run: |
        python -m compileall -q app tests scripts

    - name: Lint with flake8
      run: |
        flake8 app tests scripts --count --show-source --statistics

    - name: Run Tests against PostgreSQL
      env:
        # INTEGRATION TESTS: Real PostgreSQL provisioned by GitHub Actions service
        # Database name contains 'test' — satisfies conftest.py safety guard
        DATABASE_URL: postgresql+asyncpg://featureflow:featureflow_password@localhost:5432/featureflow_test
        REDIS_URL: redis://localhost:6379/0
        ENVIRONMENT: test
        PYTHONPATH: .
        # JWT secret: meets RFC 7518 minimum 32-byte requirement for HS256
        JWT_SECRET_KEYS: featureflow-ci-test-secret-key-32bytes
      run: |
        pytest tests/ -v --timeout=60

    - name: Verify certification script
      env:
        DATABASE_URL: postgresql+asyncpg://featureflow:featureflow_password@localhost:5432/featureflow_test
        REDIS_URL: redis://localhost:6379/0
        ENVIRONMENT: test
        PYTHONPATH: .
        JWT_SECRET_KEYS: featureflow-ci-test-secret-key-32bytes
      run: |
        python scripts/certify_production.py

  build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend Image
      run: docker build -t myorg/featureflow-api:latest .

    - name: Push Backend Image
      run: docker push myorg/featureflow-api:latest

    - name: Build Frontend Image
      run: docker build -t myorg/featureflow-ui:latest ./app/frontend

    - name: Push Frontend Image
      run: docker push myorg/featureflow-ui:latest
